apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval:     5s
      evaluation_interval: 5s
      scrape_timeout:      5s

    scrape_configs:

      # ── DCGM exporter — scrape all pods across all nodes ────────────────
      # DaemonSet pods each only report their own node's GPUs, so we must
      # scrape every pod individually, not the single ClusterIP.
      - job_name: 'dcgm'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['gpu-operator']
        relabel_configs:
          # Only scrape nvidia-dcgm-exporter pods
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: nvidia-dcgm-exporter
            action: keep
          # Use pod IP on port 9400
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:9400
          # Carry through useful labels
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - target_label: cluster
            replacement: l40s-cluster

      # ── Kubelet node-level metrics (routed through the API server) ────────
      # This avoids needing direct node network access or hostNetwork.
      # The bearer token lets Prometheus authenticate to the API server,
      # which then proxies to each node's kubelet.
      - job_name: 'kubelet'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true   # kubelet often uses a self-signed cert
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics

      # ── cAdvisor — per-container CPU & memory (all namespaces) ───────────
      - job_name: 'cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
        metric_relabel_configs:
          # Drop high-cardinality metrics you won't use in dashboards
          - source_labels: [__name__]
            regex: 'container_(network_tcp_usage_total|tasks_state|memory_failures_total)'
            action: drop
