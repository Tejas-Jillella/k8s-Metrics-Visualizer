apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      scrape_timeout:      10s

    scrape_configs:

      # ── DCGM exporter already running in gpu-operator namespace ──────────
      # Scraping by ClusterIP directly — no service discovery needed
      - job_name: 'dcgm'
        static_configs:
          - targets: ['10.98.78.19:9400']
        relabel_configs:
          - target_label: cluster
            replacement: l40s-cluster

      # ── Kubelet node-level metrics (routed through the API server) ────────
      # This avoids needing direct node network access or hostNetwork.
      # The bearer token lets Prometheus authenticate to the API server,
      # which then proxies to each node's kubelet.
      - job_name: 'kubelet'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true   # kubelet often uses a self-signed cert
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics

      # ── cAdvisor — per-container CPU & memory (all namespaces) ───────────
      - job_name: 'cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
        metric_relabel_configs:
          # Drop high-cardinality metrics you won't use in dashboards
          - source_labels: [__name__]
            regex: 'container_(network_tcp_usage_total|tasks_state|memory_failures_total)'
            action: drop
